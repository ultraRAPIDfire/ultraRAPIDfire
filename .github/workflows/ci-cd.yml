# Name for the workflow, which will be displayed in the "Actions" tab on GitHub
name: CI/CD Pipeline

# This section defines when the workflow should run.
on:
  # Run on pushes to the "main" branch
  push:
    branches: [ "main" ]
  # Run on pull requests targeting the "main" branch
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow is made up of one or more "jobs"
jobs:
  # We'll define a single job called "build-and-test"
  build-and-test:
    # The job will run on the latest version of Ubuntu
    runs-on: ubuntu-latest

    # The "steps" are the individual tasks the job will perform
    steps:
      # Step 1: Check out the repository's code so the workflow can access it
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up the correct version of Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using a recent LTS version
          cache: 'npm' # Cache npm dependencies to speed up future runs

      # Step 3: Install all project dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run the build command. For Vite, `npm run build` typically runs `tsc && vite build`.
      # This checks for TypeScript errors and then builds the project.
      # If any error occurs here, this step will fail, the workflow will stop, and GitHub will show a red 'X'.
      - name: Build project
        run: npm run build

  report-failure:
    name: Report Failure
    runs-on: ubuntu-latest
    # This job runs only if the build-and-test job fails.
    if: failure()
    # This job needs the build-and-test job to have run first.
    needs: [build-and-test]
    steps:
      - name: Add failure comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const run_id = context.runId;
            
            const body = `### :x: CI Check Failed\n\nThe \`build-and-test\` job failed for this code.\n\nTo see what went wrong and fix the main problem, please review the **Workflow Run Details**.`;

            // If it's a pull request, comment on the PR. Otherwise, comment on the commit.
            if (context.issue.number) {
              await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body });
            } else {
              await github.rest.repos.createCommitComment({ owner, repo, commit_sha: sha, body });
            }