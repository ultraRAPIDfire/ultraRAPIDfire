name: ultraRAPIDfire DevOps Blocker

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ultrarapidfire-devops-blocker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript + Vite/CSS checks)
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload CI build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 3

  notify-pr-failure:
    name: PR Failure Comment
    needs: ci
    if: always() && github.event_name == 'pull_request' && needs.ci.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download CI build log artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ci-build-log
          path: .

      - name: Post formatted failure details to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- ultrarapidfire-devops-blocker -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const fallback = ["No parsed lines found.", "Open full logs for full context."].join("\n");
            const lines = fs.existsSync("build.log")
              ? fs.readFileSync("build.log", "utf8").split(/\r?\n/)
              : [];

            const pick = (regex, limit = 4) => lines.filter((line) => regex.test(line)).slice(0, limit);

            const lintLike = pick(/eslint|@typescript-eslint|\bwarning\b|\bproblem\b|no-unused|no-explicit-any/i);
            const tsLike = pick(/error TS\d+|Type\s'.*'\sis\snot\sassignable|Cannot find name|Property\s'.*'\sdoes not exist/i);
            const buildLike = pick(/\berror\b|failed|syntax|Unexpected token|Parse error|vite v|transforming/i, 8);

            const toBlock = (arr) => arr.length ? arr.join("\n") : fallback;

            const body = [
              marker,
              "❌ **ultraRAPIDfire Gatekeeper: Build Blocked**",
              "",
              "### 🔎 What exactly went wrong?",
              "",
              "**Pseudo Lint/Code Style Signals:**",
              "```txt",
              toBlock(lintLike),
              "```",
              "",
              "**TypeScript/Build Signals:**",
              "```txt",
              toBlock(tsLike.length ? tsLike : buildLike),
              "```",
              "",
              "### 🛠️ Next Steps",
              "1. Fix the lines mentioned above locally.",
              "2. Run `npm run build` before pushing.",
              "3. Push again to re-run checks.",
              "",
              `🔗 [Full Debug Logs](${runUrl})`
            ].join("\n");

            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((c) =>
              c.user?.type === "Bot" &&
              c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }

  deploy-vercel:
    name: Deploy to Vercel
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not set. Skipping deploy hook trigger."
            exit 0
          fi

          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets['VERCEL_DEPLOY_HOOK_URL'] }}