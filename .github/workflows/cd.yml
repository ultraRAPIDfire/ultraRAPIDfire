name: Continuous Deployment
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}-webeng" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/web.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:main
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "server/docker-compose.webeng.yml,server/deploy-webeng.sh"
          target: "/opt/webeng"

      - uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: IMAGE_NAME,GHCR_USERNAME,GHCR_PAT
          script: |
            set -e
            mkdir -p /opt/webeng/server
            chmod +x /opt/webeng/server/deploy-webeng.sh
            cat > /opt/webeng/.env <<EOF
            WEBENG_IMAGE=${IMAGE_NAME}:main
            EOF
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            /opt/webeng/server/deploy-webeng.sh